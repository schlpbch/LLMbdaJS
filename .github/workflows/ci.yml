name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: pnpm run coverage

      - name: Publish coverage badge
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        run: |
          PCT=$(node -e "console.log(Math.round(require('./coverage/coverage-summary.json').total.statements.pct))")
          COLOR=$(node -e "const p=$PCT; console.log(p>=80?'brightgreen':p>=60?'yellow':'red')")
          mkdir -p /tmp/badge
          printf '{"schemaVersion":1,"label":"coverage","message":"%s%%","color":"%s"}' "$PCT" "$COLOR" > /tmp/badge/coverage.json

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin badges || true
          if git ls-remote --exit-code --heads origin badges > /dev/null; then
            git checkout badges
          else
            git checkout --orphan badges
            git rm -rf . > /dev/null 2>&1 || true
          fi
          cp /tmp/badge/coverage.json coverage.json
          git add coverage.json
          git diff --cached --quiet || git commit -m "Update coverage badge"
          git push origin badges
